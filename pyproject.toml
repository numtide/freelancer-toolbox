# Workspace root: shared ruff and mypy config for all members; uv workspace table.
[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  # pydocstyle
  "D",
  # todo comments
  "TD",
  # fixmes
  "FIX",

  # commented out code
  "ERA001",

  # Unused function argument
  "ARG001",
  "ARG002",

  "DTZ", # we don't care about timezone stuff

  # Dynamically typed expressions (typing.Any)
  "ANN401",
  # Trailing comma missing
  "COM812",
  # Unnecessary `dict` call (rewrite as a literal)
  "C408",
  # Boolean-typed positional argument in function definition
  "FBT001",
  # Logging statement uses f-string
  "G004",
  # disabled on ruff's recommendation as causes problems with the formatter
  "ISC001",
  # Use of `assert` detected
  "S101",
  # `subprocess` call: check for execution of untrusted input
  "S603",
  # Starting a process with a partial executable path
  "S607",
  # Boolean default positional argument in function definition
  "FBT002",

  "S310", # Audit URL open for permitted schemes. Allowing use of `file:` or custom schemes is often unexpected.

  # Too many statements
  "PLR0915",
  # Too many arguments in function definition
  "PLR0913",
  "PLR0912", # Too many branches
  # $X is too complex
  "C901",

  "E501", # line too long
  "T201", # `print` found
  "T203", # `pprint` found
  "PLR2004", # Magic value used in comparison

  "RET505", # superfluous-else-return
]

[tool.mypy]
python_version = "3.13"
strict = true

[[tool.mypy.overrides]]
module = ["setuptools.*", "pytest.*", "rich.*", "quipu.*"]
ignore_missing_imports = true

[tool.uv.workspace]
members = ["packages/*"]
