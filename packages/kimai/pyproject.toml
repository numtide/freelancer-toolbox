[project]
name = "kimai"
version = "0.1.0"
description = "Export Kimai timesheets with currency conversion"
readme = "README.md"
requires-python = ">=3.13"
license = "MIT"
dependencies = [
    "rest",
    "transferwise",
]

[project.scripts]
kimai-exporter = "kimai_exporter.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kimai", "src/kimai_exporter"]

[tool.uv.sources]
rest = { workspace = true }
transferwise = { workspace = true }
