[project]
name = "working-days-calculator"
version = "0.1.0"
description = "Calculate working days from a Harvest time report CSV"
readme = "README.md"
requires-python = ">=3.13"
license = "MIT"
dependencies = []

[project.scripts]
working-days-calculator = "working_days_calculator:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/working_days_calculator"]
