[project]
name = "harvest-exporter"
version = "0.1.0"
description = "Export and aggregated harvest time recordings to generate bills"
authors = [
    {name = "Jörg Thalheim", email = "joerg@thalheim.io"}
]
license = "MIT"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "rich",
    "rest",
    "transferwise",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Topic :: Utilities",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.13",
]

[project.urls]
Homepage = "https://github.com/numtide/harvest-invoice-calculator"

[project.scripts]
harvest-exporter = "harvest_exporter.cli:main"
harvest-rounder = "harvest_rounder.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/harvest", "src/harvest_exporter", "src/harvest_rounder"]

[tool.uv.sources]
rest = { workspace = true }
transferwise = { workspace = true }
