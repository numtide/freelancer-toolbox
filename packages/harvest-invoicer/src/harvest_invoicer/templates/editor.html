<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Invoice editor — {{ invoice.number }}</title>
  <script src="/static/htmx.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1D1E1C;
      --cream: #FFF8F1;
      --orange: #FA5D00;
      --orange-hover: #E15400;
      --surface: #FFFFFF;
      --line: rgba(29,30,28,0.08);
      --line-strong: rgba(29,30,28,0.14);
      --text-2: rgba(29,30,28,0.65);
      --text-3: rgba(29,30,28,0.5);
      --ok: #2E8A6A;
      --danger: #E5484D;
      --r-input: 10px;
      --r-card: 20px;
      --font: 'Schibsted Grotesk', system-ui, -apple-system, sans-serif;
      --maxw: 1240px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
    }

    /* ===== Top bar ===== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 32px;
      background: rgba(255,248,241,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .topbar .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }
    .topbar .logo {
      display: block;
      height: 24px;
      width: auto;
    }
    .topbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.1;
      white-space: nowrap;
    }
    .topbar .invoice-no {
      color: var(--text-3);
      font-weight: 500;
      font-size: 14px;
    }
    .topbar .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }
    #render-status {
      font-size: 14px;
      max-width: 420px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== Layout ===== */
    main {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 32px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 1000px) {
      .layout { grid-template-columns: minmax(0, 1fr); }
    }
    .editor-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }
    .preview-col { min-width: 0; }

    /* ===== Cards ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-card);
      padding: 24px;
    }
    .card h2 {
      margin: 0 0 16px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }

    /* ===== Inputs ===== */
    input[type=text], input[type=number], input[type=date] {
      width: 100%;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line-strong);
      border-radius: var(--r-input);
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 15px;
    }
    input[type=number] {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(250,93,0,0.15);
    }
    input[type=checkbox] { accent-color: var(--orange); }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .field { display: block; }
    .field-wide { grid-column: 1 / -1; }
    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    /* ===== Buttons ===== */
    button {
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: var(--r-input);
      border: none;
      cursor: pointer;
    }
    button:focus-visible {
      outline: 2px solid var(--orange);
      outline-offset: 2px;
    }
    button.primary {
      background: var(--orange);
      color: #fff;
    }
    button.primary:hover { background: var(--orange-hover); }
    button.secondary {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line-strong);
    }
    button.secondary:hover { border-color: var(--ink); }
    button.text-btn {
      background: transparent;
      color: var(--text-3);
      padding: 6px 10px;
    }
    button.text-btn:hover { color: var(--danger); }

    /* ===== Line-items table ===== */
    table.lines {
      width: 100%;
      border-collapse: collapse;
    }
    table.lines th {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
    }
    table.lines th.num { text-align: right; }
    table.lines td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }
    table.lines tbody tr:hover { background: rgba(250,93,0,0.03); }
    table.lines input[type=number] { width: 100px; }
    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .toolbar {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ===== Totals ===== */
    .totals-editor {
      margin-left: auto;
      border-collapse: collapse;
    }
    .totals-editor td {
      padding: 4px 0 4px 32px;
      font-variant-numeric: tabular-nums;
    }
    .totals-editor td:first-child {
      color: var(--text-3);
      text-align: right;
    }
    .totals-editor .grand td {
      font-weight: 700;
      font-size: 17px;
      padding-top: 10px;
      border-top: 1px solid var(--line-strong);
    }
    .totals-editor .grand td:first-child { color: var(--ink); }

    /* ===== Render / status ===== */
    .render-ok {
      color: var(--ok);
      font-weight: 600;
      font-size: 14px;
      margin: 0;
    }
    #fetch-status {
      font-size: 14px;
      align-self: center;
    }
    .fetch-ok { color: var(--ok); font-weight: 600; }
    .fetch-err { color: var(--danger); font-weight: 600; }
    .check-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .htmx-indicator {
      display: none;
      align-self: center;
      font-size: 14px;
      color: var(--text-3);
    }
    .htmx-request.htmx-indicator,
    .htmx-request .htmx-indicator { display: inline; }
    button[disabled] { opacity: 0.6; cursor: default; }

    /* ===== Preview ===== */
    .preview-col .card { padding: 16px; }
    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .preview-head h2 { margin: 0; }
    .seg { display: flex; gap: 10px; }
    .seg-btn {
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line-strong);
      color: var(--ink);
    }
    .seg-btn.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    iframe {
      display: block;
      width: 100%;
      height: 900px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="/static/harvest-logo.svg" alt="Harvest">
      <h1>Invoice editor <span class="invoice-no">{{ invoice.number }}</span></h1>
    </div>
    <div class="actions">
      <div id="render-status"></div>
      <button class="primary" title="Output: {{ output_path }}"
        hx-post="/render" hx-target="#render-status" hx-swap="outerHTML"
        hx-disabled-elt="this">
        Generate PDF
      </button>
    </div>
  </header>

  <main>
    <div class="layout">
      <div class="editor-col">

        <section class="card">
          <h2>Invoice details</h2>
          <form id="meta-form">
            {% include "partials/meta.html" %}
          </form>
          <div class="toolbar">
            <button type="button" class="secondary"
              title="Import time entries from Harvest for the selected period (replaces current line items)"
              hx-post="/lines/fetch" hx-include="#meta-form, #merge-on-fetch"
              hx-confirm="Replace the current line items with data fetched for the selected period?"
              hx-indicator="#fetch-indicator" hx-disabled-elt="this"
              hx-target="#line-rows" hx-swap="outerHTML">Fetch from Harvest</button>
            <label class="check-inline"
              title="Collapse rows with the same description, rate, and VAT after importing">
              <input type="checkbox" id="merge-on-fetch" name="merge_duplicates" checked>
              Merge duplicates
            </label>
            <span id="fetch-indicator" class="htmx-indicator">Fetching…</span>
            <span id="fetch-status"></span>
          </div>
        </section>

        <section class="card">
          <h2>Line items</h2>
          <table class="lines">
            <thead>
              <tr>
                <th style="width:24px"></th>
                <th>Description</th>
                <th class="num">Qty</th>
                <th class="num">Unit price ({{ invoice.currency }})</th>
                <th class="num">Subtotal ({{ invoice.currency }})</th>
                <th></th>
              </tr>
            </thead>
            {% include "partials/rows.html" %}
          </table>

          <div class="toolbar">
            <button type="button" class="secondary" hx-post="/lines/add"
              hx-target="#line-rows" hx-swap="outerHTML">Add row</button>

            <form id="merge-form" style="display:inline">
              <button type="button" class="secondary"
                hx-post="/lines/merge" hx-include="#merge-form"
                hx-target="#line-rows" hx-swap="outerHTML">Merge selected</button>
            </form>

            <button type="button" class="secondary"
              title="Combine rows with the same description, rate, and VAT into one line"
              hx-post="/lines/merge-duplicates"
              hx-target="#line-rows" hx-swap="outerHTML">Merge duplicates</button>

            <button type="button" class="secondary"
              title="Restore the line items from before the last change (press again to redo)"
              hx-post="/lines/undo"
              hx-target="#line-rows" hx-swap="outerHTML">Undo</button>
          </div>
        </section>

        <section class="card">
          <h2>Totals</h2>
          {% include "partials/totals.html" %}
        </section>

      </div><!-- editor-col -->

      <div class="preview-col">
        <section class="card">
          <div class="preview-head">
            <h2>Live preview</h2>
            <div class="seg" role="tablist" aria-label="Preview mode">
              <button type="button" id="mode-html" class="seg-btn active"
                title="Instant HTML preview (same template and stylesheet as the PDF)">HTML</button>
              <button type="button" id="mode-pdf" class="seg-btn"
                title="Exact PDF preview — byte-identical to the generated file">PDF</button>
            </div>
          </div>
          <iframe id="preview-frame" src="/preview" title="Invoice preview"></iframe>
        </section>
      </div>

    </div><!-- layout -->
  </main>

  <script>
    // Preview refresh. HTML mode reloads instantly after each edit; PDF mode
    // re-renders through WeasyPrint (~0.5-1s), so refreshes are debounced.
    (function () {
      var frame = document.getElementById("preview-frame");
      var htmlBtn = document.getElementById("mode-html");
      var pdfBtn = document.getElementById("mode-pdf");
      var mode = "html";
      var debounce = null;

      function srcFor(m) {
        // Cache-busting query so assigning src always re-renders the PDF.
        return m === "pdf" ? "/preview.pdf?t=" + Date.now() + "#toolbar=0" : "/preview";
      }

      function setMode(m) {
        mode = m;
        htmlBtn.classList.toggle("active", m === "html");
        pdfBtn.classList.toggle("active", m === "pdf");
        frame.src = srcFor(m);
      }
      htmlBtn.addEventListener("click", function () { setMode("html"); });
      pdfBtn.addEventListener("click", function () { setMode("pdf"); });

      function refresh() {
        if (mode === "pdf") {
          frame.src = srcFor("pdf");
        } else if (frame.contentWindow) {
          frame.contentWindow.location.reload();
        }
      }

      document.body.addEventListener("htmx:afterRequest", function (evt) {
        if (!evt.detail.successful) return;
        clearTimeout(debounce);
        debounce = setTimeout(refresh, mode === "pdf" ? 600 : 0);
      });
    })();
  </script>
</body>
</html>
